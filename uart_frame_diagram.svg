<svg viewBox="0 0 1120 468" xmlns="http://www.w3.org/2000/svg">
<rect width="1120" height="468" fill="white"/>

<!-- ===== TITLE ===== -->
<text x="560" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e" font-family="Arial, sans-serif">UART Signal Waveform — Character  'A'  (ASCII 0x41 = 0100 0001₂)  at 9600 Baud</text>
<text x="560" y="44" text-anchor="middle" font-size="11" fill="#555" font-family="Arial, sans-serif">Format: 8N1  |  1 Start Bit + 8 Data Bits (LSB first) + 1 Stop Bit = 10 bits total  |  Bit period = 104.17 μs  |  Full frame = 1.04 ms</text>

<!-- ===== BACKGROUND BANDS ===== -->
<rect x="100" y="60" width="80"  height="210" fill="#eeeeee"/><!-- IDLE PRE -->
<rect x="180" y="60" width="80"  height="210" fill="#fde8e8"/><!-- START -->
<rect x="260" y="60" width="640" height="210" fill="#eef2ff"/><!-- DATA D0-D7 -->
<rect x="900" y="60" width="80"  height="210" fill="#e4f7ec"/><!-- STOP -->
<rect x="980" y="60" width="100" height="210" fill="#eeeeee"/><!-- IDLE POST -->

<!-- ===== SLOT BOUNDARY LINES ===== -->
<line x1="100"  y1="60" x2="100"  y2="270" stroke="#aaa" stroke-width="1"/>
<line x1="1080" y1="60" x2="1080" y2="270" stroke="#aaa" stroke-width="1"/>
<line x1="180"  y1="60" x2="180"  y2="270" stroke="#c0392b" stroke-width="1.5"/>
<line x1="260"  y1="60" x2="260"  y2="270" stroke="#888"    stroke-width="0.8" stroke-dasharray="4,3"/>
<line x1="340"  y1="60" x2="340"  y2="270" stroke="#888"    stroke-width="0.8" stroke-dasharray="4,3"/>
<line x1="420"  y1="60" x2="420"  y2="270" stroke="#888"    stroke-width="0.8" stroke-dasharray="4,3"/>
<line x1="500"  y1="60" x2="500"  y2="270" stroke="#888"    stroke-width="0.8" stroke-dasharray="4,3"/>
<line x1="580"  y1="60" x2="580"  y2="270" stroke="#888"    stroke-width="0.8" stroke-dasharray="4,3"/>
<line x1="660"  y1="60" x2="660"  y2="270" stroke="#888"    stroke-width="0.8" stroke-dasharray="4,3"/>
<line x1="740"  y1="60" x2="740"  y2="270" stroke="#888"    stroke-width="0.8" stroke-dasharray="4,3"/>
<line x1="820"  y1="60" x2="820"  y2="270" stroke="#888"    stroke-width="0.8" stroke-dasharray="4,3"/>
<line x1="900"  y1="60" x2="900"  y2="270" stroke="#1a7d45" stroke-width="1.5"/>
<line x1="980"  y1="60" x2="980"  y2="270" stroke="#aaa"    stroke-width="1"/>

<!-- ===== HIGH / LOW REFERENCE DASHED LINES ===== -->
<line x1="100" y1="120" x2="1080" y2="120" stroke="#999" stroke-width="0.7" stroke-dasharray="6,5"/>
<line x1="100" y1="240" x2="1080" y2="240" stroke="#999" stroke-width="0.7" stroke-dasharray="6,5"/>

<!-- ===== Y-AXIS LABELS ===== -->
<text x="96"  y="115" text-anchor="end" font-size="11" fill="#1a3a8f" font-weight="bold" font-family="Arial">HIGH</text>
<text x="96"  y="128" text-anchor="end" font-size="9"  fill="#1a3a8f" font-family="Arial">(Logic 1)</text>
<text x="96"  y="244" text-anchor="end" font-size="11" fill="#b03030" font-weight="bold" font-family="Arial">LOW</text>
<text x="96"  y="256" text-anchor="end" font-size="9"  fill="#b03030" font-family="Arial">(Logic 0)</text>

<!-- TX/RX label rotated -->
<text x="22" y="185" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-family="Arial" transform="rotate(-90,22,185)">TX / RX LINE</text>

<!-- ===== SAMPLING DASHED LINES (orange) ===== -->
<!-- T0 x=220 LOW(240)  --> <line x1="220" y1="82" x2="220" y2="240" stroke="#d35400" stroke-width="1.2" stroke-dasharray="4,3"/>
<!-- T1 x=300 HIGH(120) --> <line x1="300" y1="82" x2="300" y2="120" stroke="#d35400" stroke-width="1.2" stroke-dasharray="4,3"/>
<!-- T2 x=380 LOW(240)  --> <line x1="380" y1="82" x2="380" y2="240" stroke="#d35400" stroke-width="1.2" stroke-dasharray="4,3"/>
<!-- T3 x=460 LOW(240)  --> <line x1="460" y1="82" x2="460" y2="240" stroke="#d35400" stroke-width="1.2" stroke-dasharray="4,3"/>
<!-- T4 x=540 LOW(240)  --> <line x1="540" y1="82" x2="540" y2="240" stroke="#d35400" stroke-width="1.2" stroke-dasharray="4,3"/>
