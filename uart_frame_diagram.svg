<text x="140"  y="291" text-anchor="middle" font-size="10" fill="#888" font-family="Arial">IDLE</text>
<text x="220"  y="291" text-anchor="middle" font-size="11" fill="#222" font-weight="bold" font-family="Courier New">T0</text>
<text x="300"  y="291" text-anchor="middle" font-size="11" fill="#222" font-weight="bold" font-family="Courier New">T1</text>
<text x="380"  y="291" text-anchor="middle" font-size="11" fill="#222" font-weight="bold" font-family="Courier New">T2</text>
