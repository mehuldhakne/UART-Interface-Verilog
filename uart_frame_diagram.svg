<rect x="203" y="318" width="34" height="20" rx="4" fill="#fde8e8" stroke="#c0392b" stroke-width="1.2"/>
<text x="220"  y="333" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="bold" font-family="Courier New">0</text>
