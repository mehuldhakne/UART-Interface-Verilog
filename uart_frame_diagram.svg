<text x="700"  y="310" text-anchor="middle" font-size="10" fill="#1a3a8f" font-weight="bold" font-family="Arial">D5</text>
<text x="780"  y="310" text-anchor="middle" font-size="10" fill="#1a3a8f" font-weight="bold" font-family="Arial">D6</text>
<text x="860"  y="310" text-anchor="middle" font-size="10" fill="#1a3a8f" font-weight="bold" font-family="Arial">D7 (MSB)</text>
<text x="940"  y="310" text-anchor="middle" font-size="10" fill="#1a7d45" font-weight="bold" font-family="Arial">STOP</text>

<!-- ===== BIT VALUE BOXES ===== -->
