<text x="940"  y="333" text-anchor="middle" font-size="13" fill="#1a7d45" font-weight="bold" font-family="Courier New">1</text>

<!-- ===== BINARY DECODE LINE ===== -->
<rect x="100" y="350" width="980" height="22" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="0.8"/>
<text x="590" y="365" text-anchor="middle" font-size="11" fill="#333" font-family="Arial">
  Reassemble MSB→LSB (D7 to D0):
  <tspan font-family="Courier New" font-weight="bold" fill="#1a3a8f">  0  1  0  0  0  0  0  1  </tspan>
  =  <tspan font-family="Courier New" font-weight="bold" fill="#1a3a8f">0x41</tspan>
  =  <tspan font-family="Courier New" font-weight="bold" fill="#c0392b">'A'</tspan>
  (ASCII 65)
</text>

<!-- ===== LEGEND BOX ===== -->
<rect x="100" y="382" width="980" height="74" rx="5" fill="#fafafa" stroke="#ddd" stroke-width="1"/>

<!-- Legend row 1 -->
<line x1="118" y1="400" x2="148" y2="400" stroke="#d35400" stroke-width="1.2" stroke-dasharray="4,3"/>
<circle cx="133" cy="400" r="4" fill="#d35400" stroke="white" stroke-width="1"/>
<text x="156" y="404" font-size="10" fill="#444" font-family="Arial">↓ Sample Here = Mid-bit sampling point, at exactly ½ × bit period (52.08 μs) from the bit edge. RX samples here for max noise immunity.</text>

<!-- Legend row 2: color key -->
<rect x="118" y="416" width="13" height="11" fill="#eeeeee" stroke="#aaa" stroke-width="0.8"/>
<text x="136" y="426" font-size="10" fill="#444" font-family="Arial">Idle (line HIGH)</text>

<rect x="238" y="416" width="13" height="11" fill="#fde8e8" stroke="#c0392b" stroke-width="0.8"/>
<text x="256" y="426" font-size="10" fill="#444" font-family="Arial">Start bit (always 0, pulls line LOW)</text>

<rect x="448" y="416" width="13" height="11" fill="#dde5ff" stroke="#1a3a8f" stroke-width="0.8"/>
<text x="466" y="426" font-size="10" fill="#444" font-family="Arial">Data bits D0–D7 (LSB sent first)</text>

<rect x="650" y="416" width="13" height="11" fill="#e4f7ec" stroke="#1a7d45" stroke-width="0.8"/>
<text x="668" y="426" font-size="10" fill="#444" font-family="Arial">Stop bit (always 1, returns line HIGH)</text>

<!-- Legend row 3 -->
<line x1="118" y1="443" x2="1075" y2="443" stroke="#eee" stroke-width="0.8"/>
<text x="590" y="448" text-anchor="middle" font-size="9.5" fill="#888" font-family="Arial">
  Wire state on transition: IDLE(1) → START(0) → D0(1) → D1(0) → D2(0) → D3(0) → D4(0) → D5(0) → D6(1) → D7(0) → STOP(1) → IDLE(1)
</text>

</svg>
