<rect x="363" y="318" width="34" height="20" rx="4" fill="#dde5ff" stroke="#1a3a8f" stroke-width="1.2"/>
<text x="380"  y="333" text-anchor="middle" font-size="13" fill="#1a3a8f" font-weight="bold" font-family="Courier New">0</text>
