<!-- T8 x=860 LOW(240)  --> <line x1="860" y1="82" x2="860" y2="240" stroke="#d35400" stroke-width="1.2" stroke-dasharray="4,3"/>
<!-- T9 x=940 HIGH(120) --> <line x1="940" y1="82" x2="940" y2="120" stroke="#d35400" stroke-width="1.2" stroke-dasharray="4,3"/>

