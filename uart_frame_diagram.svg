<line x1="502" y1="278" x2="578" y2="278" stroke="#bbb" stroke-width="0.8"/>
<line x1="582" y1="278" x2="658" y2="278" stroke="#bbb" stroke-width="0.8"/>
<line x1="662" y1="278" x2="738" y2="278" stroke="#bbb" stroke-width="0.8"/>
<line x1="742" y1="278" x2="818" y2="278" stroke="#bbb" stroke-width="0.8"/>
