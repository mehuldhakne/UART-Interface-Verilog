<text x="1030" y="291" text-anchor="middle" font-size="10" fill="#888" font-family="Arial">IDLE</text>

<!-- ===== BIT NAME LABELS ===== -->
<text x="220"  y="310" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold" font-family="Arial">START</text>
<text x="300"  y="310" text-anchor="middle" font-size="10" fill="#1a3a8f" font-weight="bold" font-family="Arial">D0 (LSB)</text>
<text x="380"  y="310" text-anchor="middle" font-size="10" fill="#1a3a8f" font-weight="bold" font-family="Arial">D1</text>
<text x="460"  y="310" text-anchor="middle" font-size="10" fill="#1a3a8f" font-weight="bold" font-family="Arial">D2</text>
