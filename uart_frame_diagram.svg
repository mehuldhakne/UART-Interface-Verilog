<circle cx="860" cy="240" r="5.5" fill="#d35400" stroke="white" stroke-width="1.5"/>
<circle cx="940" cy="120" r="5.5" fill="#d35400" stroke="white" stroke-width="1.5"/>

<!-- ===== MAIN WAVEFORM ===== -->
<path d="M 100 120 H 180 V 240 H 260 V 120 H 340 V 240 H 740 V 120 H 820 V 240 H 900 V 120 H 1080"
  fill="none" stroke="#1a3a8f" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round"/>

